# External tool configuration for Accessibility Project Manager
#
# Set each [tools] entry to either:
#   - The bare executable name  (if the tool is already on PATH)
#   - The full path to the executable
#
# Add any directories that need to be prepended to PATH under [paths].
# List one directory per line, indented for continuation lines.
#
# This file is read once at startup.  Restart the app after editing it.

[tools]
# DAISY Ace — EPUB accessibility checker
# Common names: ace, daisy-ace
ace = ace

# EPUBCheck — EPUB structure validator
# Common names: epubcheck, java (when run as: java -jar /path/to/epubcheck.jar)
epubcheck = epubcheck

# DAISY Pipeline — document conversion / production pipeline
# Common names: pipeline2, daisy-pipeline, dp2
pipeline = pipeline2

# LibLouis — Braille translation library CLI
# Common names: lou_translate, file2brl, lou_checktable
liblouis = lou_translate

[paths]
# Extra directories to prepend to PATH (one per line, indent continuations)
# Example:
#   extra =
#       /opt/daisy-pipeline/bin
#       /usr/local/share/npm/bin
extra =
