site_name: Accessibility Project Management
site_description: Professional documentation for the Accessibility Project Management platform
site_author: Michael Ryan Hunsaker, M.Ed., Ph.D.
site_url: https://mrhunsaker.github.io/AccessibilityProjectManagement/

repo_name: mrhunsaker/AccessibilityProjectManagement
repo_url: https://github.com/mrhunsaker/AccessibilityProjectManagement
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024-2026 Michael Ryan Hunsaker

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
  icon:
    logo: material/book-open-variant
    repo: fontawesome/brands/github

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: [accessibility_mgr]
  - git-revision-date:
      enabled: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - First Steps: getting-started/first-steps.md
  - User Guide:
      - user-guide/index.md
      - Dashboard: user-guide/dashboard.md
      - Quick Create: user-guide/quick-create.md
      - Search: user-guide/search.md
      - Lineage Viewer: user-guide/lineage-viewer.md
      - Workflows:
          - user-guide/workflows/index.md
          - Overview: user-guide/workflows/overview.md
          - Braille: user-guide/workflows/braille.md
          - Large Print: user-guide/workflows/large-print.md
          - eBraille: user-guide/workflows/ebraille.md
          - EPUB3 / DAISY: user-guide/workflows/epub-daisy.md
          - Tactile Graphics: user-guide/workflows/tactile-graphics.md
          - 3-D Print: user-guide/workflows/3d-print.md
          - Pipelines: user-guide/workflows/pipelines.md
          - Students: user-guide/workflows/students.md
  - Administration:
      - administration/index.md
      - REST API: administration/api.md
      - Backup & Restore: administration/backup-restore.md
      - Configurable Categories: administration/categories.md
      - Database Migrations: administration/migration.md
      - Performance: administration/performance.md
      - Printers & Embossers: administration/printers-embossers.md
      - Security Guide: administration/security.md
      - Multi-Tenancy: administration/tenants.md
      - Users & Roles: administration/users-roles.md
  - Development:
      - development/index.md
      - Architecture Overview: overview.md
      - Code Structure: development/code-structure.md
      - Custom Metadata Fields: development/custom-fields.md
      - Custom Workflows & Pipelines: development/custom-workflows.md
      - Debugging: development/debugging.md
      - Local Development Setup: development/local-dev.md
      - Extending APM: development/plugins.md
      - Testing: development/test-cases.md
  - Operations:
      - operations/index.md
      - Deployment: operations/deployment.md
      - Monitoring: operations/monitoring.md
      - Scaling: operations/scaling.md
  - Reference:
      - reference/index.md
      - API (Code Reference): reference/api.md
      - Application: reference/app.md
      - Architecture Decisions (ADRs): reference/architecture-decisions.md
      - Data Flow: reference/data-flow.md
      - Database: reference/database.md
      - Environment Variables: reference/environment-variables.md
      - Error Codes: reference/error-codes.md
      - Glossary: reference/glossary.md
      - Keyboard Shortcuts: reference/keyboard-shortcuts.md
      - Models: reference/models.md
      - Security Reference: reference/security.md
      - Services: reference/services.md
      - UI: reference/ui.md
  - Project:
      - project/index.md
      - Contributing: project/contributors.md
      - Release Process: project/release-process.md
      - Roadmap: project/roadmap.md
  - Support:
      - support/index.md
      - Contact: support/contact.md
      - FAQ: support/faq.md
      - Troubleshooting: support/troubleshooting.md
  - Changelog: changelog.md
  - License: license.md

extra:
  generator: false
