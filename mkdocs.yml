site_name: Accessibility Project Management
site_description: Professional documentation for the Accessibility Project Management platform
site_author: Michael Ryan Hunsaker, M.Ed., Ph.D.
site_url: https://mrhunsaker.github.io/AccessibilityProjectManagement/

repo_name: mrhunsaker/AccessibilityProjectManagement
repo_url: https://github.com/mrhunsaker/AccessibilityProjectManagement
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024-2026 Michael Ryan Hunsaker

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
  icon:
    logo: material/book-open-variant
    repo: fontawesome/brands/github

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: [accessibility_mgr]
  - git-revision-date:
      enabled: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - User Guide:
      - Dashboard: user-guide/dashboard.md
      - Workflows: user-guide/workflows/overview.md
  - Administration:
      - API: administration/api.md
  - Reference:
      - Environment Variables: reference/environment-variables.md
  - License: license.md

extra:
  generator: false
